<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Aniversario | Experiencia Inmersiva</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Librerías de Alto Rendimiento -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --rose-gold: #B76E79;
            --rose-gold-glow: rgba(183, 110, 121, 0.4);
            --bg-dark: #0a0a0a;
            --text-light: #F9F7F2;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            overflow-x: hidden;
            background: #000;
        }

        /* Video de Fondo Cinematográfico */
        #romantic-bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translateX(-50%) translateY(-50%);
            opacity: 0.3;
            object-fit: cover;
            pointer-events: none;
            filter: grayscale(30%) contrast(110%);
        }

        canvas { display: block; }
        #cursor-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

        section { min-height: 100vh; position: relative; padding: 80px 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }

        .reveal { opacity: 0; transform: translateY(30px); }
        
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 8rem);
            text-align: center;
            margin: 0;
        }

        .hero-title span { color: var(--rose-gold); text-shadow: 0 0 30px var(--rose-gold-glow); }

        /* Galería 3D Container */
        #three-gallery-container {
            width: 100%;
            height: 600px;
            margin: 40px 0;
            border-radius: 20px;
            overflow: hidden;
            cursor: grab;
        }

        /* Evasive Button Styles */
        .proposal-box {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            margin: 0 auto;
        }

        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 30px; position: relative; height: 60px; }
        
        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-yes { background: var(--rose-gold); color: white; }
        .btn-no { background: #333; color: #999; position: absolute; }

        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10,10,10,0.8);
            padding: 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            border: 1px solid var(--rose-gold-glow);
        }

        #heart-3d-canvas {
            width: 100%;
            height: 500px;
            mix-blend-mode: screen;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="romantic-bg-video">
        <!-- Reemplazar con URL real de CDN -->
        <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-night-sky-out-of-focus-9706-large.mp4" type="video/mp4">
    </video>

    <canvas id="cursor-canvas"></canvas>

    <div class="music-player">
        <button id="play-btn" style="background:var(--rose-gold); border:none; width:40px; height:40px; border-radius:50%; color:white; cursor:pointer;">
            <i class="fas fa-play"></i>
        </button>
        <div style="font-size: 0.8rem;">
            <b>Sabes</b><br><span style="color:var(--rose-gold)">Reik</span>
        </div>
        <audio id="bg-music" loop src="TU_URL_DE_AUDIO.mp3"></audio>
    </div>

    <section id="hero">
        <h1 class="hero-title reveal">Nuestra <span>Magia</span></h1>
        <p style="text-align:center; letter-spacing:8px; text-transform:uppercase; margin-top:20px;" class="reveal">Desde el 21 de Junio de 2025</p>
    </section>

    <section id="gallery-section">
        <h2 style="text-align:center; font-family:'Playfair Display'; color:var(--rose-gold); font-size:3rem;" class="reveal">Galería Espacial</h2>
        <div id="three-gallery-container" class="reveal"></div>
    </section>

    <section id="proposal">
        <div class="proposal-box reveal">
            <h2 class="serif">¿Me amarás por siempre?</h2>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="celebrate()">¡SÍ!</button>
                <button class="btn btn-no" id="btn-no">No</button>
            </div>
        </div>
    </section>

    <section id="finale">
        <canvas id="heart-3d-canvas"></canvas>
        <h2 style="text-align:center; font-family:'Playfair Display'; font-size:4rem;" class="reveal">Feliz Aniversario, <span>Mi Amor</span></h2>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Estela de Partículas del Cursor (Matemáticas Avanzadas)
        const cursorCanvas = document.getElementById('cursor-canvas');
        const cctx = cursorCanvas.getContext('2d');
        let particles = [];
        
        function resize() {
            cursorCanvas.width = window.innerWidth;
            cursorCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02;
            }
            draw() {
                cctx.globalAlpha = this.alpha;
                cctx.fillStyle = '#B76E79';
                cctx.beginPath();
                cctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                cctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) particles.push(new Sparkle(e.clientX, e.clientY));
        });

        function animateCursor() {
            cctx.clearRect(0,0,cursorCanvas.width, cursorCanvas.height);
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // 2. Galería 3D con Three.js
        const galleryZone = document.getElementById('three-gallery-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, galleryZone.offsetWidth / galleryZone.offsetHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(galleryZone.offsetWidth, galleryZone.offsetHeight);
        galleryZone.appendChild(renderer.domElement);

        const images = [
            'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=400',
            'https://images.unsplash.com/photo-1584447128309-b66b7a4d1b63?q=80&w=400',
            'https://images.unsplash.com/photo-1608889825103-eb5ed706fc64?q=80&w=400'
        ];

        const loader = new THREE.TextureLoader();
        const planes = [];

        images.forEach((url, i) => {
            loader.load(url, (texture) => {
                const geometry = new THREE.PlaneGeometry(3, 4);
                const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = (i - 1) * 4;
                mesh.rotation.y = (i - 1) * -0.5;
                scene.add(mesh);
                planes.push(mesh);
            });
        });

        camera.position.z = 8;

        function animateGallery() {
            requestAnimationFrame(animateGallery);
            scene.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animateGallery();

        // 3. Botón Evasivo (Gamificación)
        const noBtn = document.getElementById('btn-no');
        noBtn.addEventListener('mouseenter', () => {
            const x = Math.random() * (window.innerWidth / 4);
            const y = Math.random() * 100 - 50;
            gsap.to(noBtn, { x: x, y: y, duration: 0.2 });
        });

        function celebrate() {
            alert("¡Sabía que dirías que sí! ❤️");
            confettiAnimation();
        }

        // 4. Konami Code "TEAMO"
        let buffer = "";
        window.addEventListener('keydown', (e) => {
            buffer += e.key.toLowerCase();
            if(buffer.length > 5) buffer = buffer.substring(1);
            if(buffer === "teamo") {
                gsap.to("body", { backgroundColor: "#ff0055", duration: 1 });
                alert("¡Nivel Secreto Desbloqueado: Eres mi vida entera!");
            }
        });

        // 5. Animaciones de entrada GSAP
        gsap.utils.toArray('.reveal').forEach(elem => {
            gsap.to(elem, {
                scrollTrigger: elem,
                opacity: 1,
                y: 0,
                duration: 1.5,
                ease: "power4.out"
            });
        });

        // 6. Corazón 3D Matemático Final
        const heartCanvas = document.getElementById('heart-3d-canvas');
        const hctx = heartCanvas.getContext('2d');
        heartCanvas.width = 800; heartCanvas.height = 500;
        
        const hPoints = [];
        for(let i=0; i<1500; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.random();
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            hPoints.push({x: x*10, y: y*10, z: (Math.random()-0.5)*100, color: i%2===0 ? '#B76E79' : '#fff'});
        }

        let rot = 0;
        function drawHeart() {
            hctx.clearRect(0,0,800,500);
            rot += 0.01;
            hPoints.forEach(p => {
                const rx = p.x * Math.cos(rot) - p.z * Math.sin(rot);
                const rz = p.z * Math.cos(rot) + p.x * Math.sin(rot);
                const s = 200 / (200 + rz);
                hctx.fillStyle = p.color;
                hctx.globalAlpha = s;
                hctx.beginPath();
                hctx.arc(400 + rx*s, 250 + p.y*s, 1.5*s, 0, Math.PI*2);
                hctx.fill();
            });
            requestAnimationFrame(drawHeart);
        }
        drawHeart();

        // Control de Música
        const music = document.getElementById('bg-music');
        const pBtn = document.getElementById('play-btn');
        pBtn.onclick = () => {
            if(music.paused) { music.play(); pBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { music.pause(); pBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        }
    </script>
</body>
</html>
